<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg4)" rx="12"/>
  <rect width="398" height="218" x="1" y="1" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="12"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="400" height="4" fill="#A435F0" rx="2"/>
  <!-- Udemy "u" logo mark -->
  <rect x="30" y="50" width="72" height="72" rx="8" fill="rgba(164,53,240,0.12)" stroke="rgba(164,53,240,0.25)" stroke-width="1.5"/>
  <!-- Stylised U -->
  <rect x="46" y="62" width="11" height="38" rx="3" fill="#A435F0"/>
  <rect x="79" y="62" width="11" height="38" rx="3" fill="#A435F0"/>
  <path d="M57 88 Q68 106 79 88" fill="none" stroke="#A435F0" stroke-width="10" stroke-linecap="round"/>
  <!-- Text -->
  <text x="120" y="76" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">udemy</text>
  <text x="120" y="94" font-family="Arial, sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="1">CERTIFICATE OF COMPLETION</text>
  <!-- Divider -->
  <rect x="120" y="104" width="230" height="1" fill="rgba(164,53,240,0.3)"/>
  <!-- Course name -->
  <text x="120" y="122" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#E8EAED">SQL – MySQL for Data Analytics</text>
  <text x="120" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#E8EAED">and Business Intelligence</text>
  <text x="120" y="158" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">365 Careers · 365 Team</text>
  <!-- Duration badge -->
  <rect x="120" y="165" width="80" height="20" rx="10" fill="rgba(164,53,240,0.15)" stroke="rgba(164,53,240,0.3)" stroke-width="1"/>
  <text x="160" y="179" font-family="Arial, sans-serif" font-size="9" fill="#A435F0" text-anchor="middle" font-weight="600">12 hours</text>
  <!-- Bottom -->
  <rect x="30" y="195" width="340" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="200" y="212" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">February 2025 · Aditya Ratnaparkhe</text>
</svg>
