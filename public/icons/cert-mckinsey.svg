<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg3)" rx="12"/>
  <rect width="398" height="218" x="1" y="1" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="12"/>
  <!-- Subtle top accent -->
  <rect x="0" y="0" width="400" height="4" fill="#00B4D8" rx="2"/>
  <!-- Decorative origami birds (simplified triangles echoing the certificate) -->
  <polygon points="310,35 345,75 295,70" fill="none" stroke="rgba(100,180,220,0.25)" stroke-width="1.5"/>
  <polygon points="340,20 370,55 320,52" fill="none" stroke="rgba(100,180,220,0.18)" stroke-width="1"/>
  <polygon points="360,50 385,80 345,78" fill="none" stroke="rgba(100,180,220,0.12)" stroke-width="1"/>
  <!-- McKinsey wordmark -->
  <text x="30" y="78" font-family="Georgia, serif" font-size="26" font-weight="400" fill="#ffffff" letter-spacing="-0.5">McKinsey</text>
  <text x="30" y="100" font-family="Georgia, serif" font-size="12" font-weight="400" fill="#00B4D8" letter-spacing="1">.org</text>
  <!-- Divider -->
  <rect x="30" y="112" width="200" height="1" fill="rgba(0,180,216,0.3)"/>
  <!-- Program name -->
  <text x="30" y="132" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#E8EAED" letter-spacing="0.5">Forward Program</text>
  <text x="30" y="152" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.4)">Skills for the future of work</text>
  <!-- Badge -->
  <rect x="30" y="165" width="100" height="22" rx="11" fill="rgba(0,180,216,0.1)" stroke="rgba(0,180,216,0.3)" stroke-width="1"/>
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="10" fill="#00B4D8" text-anchor="middle" font-weight="600">Completed</text>
  <!-- Bottom -->
  <rect x="30" y="195" width="340" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="200" y="212" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">December 2024 · Aditya Ratnaparkhe</text>
</svg>
